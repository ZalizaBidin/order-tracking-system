<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Offline - OrderTrack</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }

        .box {
            background: white;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.1);
            max-width: 420px;
        }

        h1 {
            color: #0d6efd;
        }

        p {
            color: #6c757d;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>You are offline</h1>
        <p>Your internet connection is unstable or unavailable.</p>
        <p>Please reconnect to continue using OrderTrack.</p>
    </div>
</body>

</html>
